<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Container Row Column</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<div class="row">

<div class="col-md-4">
<div class="bg-warning p-4 text-center">
Column 1
</div>
</div>

<div class="col-md-4">
<div class="bg-info p-4 text-center">
Column 2
</div>
</div>

<div class="col-md-4">
<div class="bg-secondary text-white p-4 text-center">
Column 3
</div>
</div>

</div>

</div>

</body>
</html>
